{% extends "base.html" %}
{% block title %}Dashboard - Attendance{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card text-center mb-4">
      <div class="card-header bg-primary text-white">
        <h4>Welcome, {{ current_user.username }}!</h4>
      </div>
      <div class="card-body">
        <h5 class="card-title">Total Students</h5>
        <p class="display-4">{{ total_students }}</p>
        <hr>
        <h5 class="card-title">Today's Attendance Marked</h5>
        <p class="display-4">{{ today_att }}</p>
      </div>
    </div>
    <div class="d-flex justify-content-center gap-3">
      <a href="{{ url_for('students') }}" class="btn btn-outline-primary">Manage Students</a>
      <a href="{{ url_for('attendance') }}" class="btn btn-outline-success">Mark Attendance</a>
      <a href="{{ url_for('report') }}" class="btn btn-outline-secondary">View Report</a>
    </div>
  </div>
</div>
{% endblock %}
